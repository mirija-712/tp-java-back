spring.application.name=auth
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3307/auth_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=X9!mQ@7ZA2^kP$R4&F8sLwEJ*H
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# ddl-auto=none : on utilise schema.sql pour créer les tables, pas Hibernate
# show-sql=false : ne pas afficher les requętes SQL en console
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Scripts SQL d'initialisation ---
# Exécutés au démarrage : schema.sql (création tables) puis data.sql (compte de test)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

spring.jpa.defer-datasource-initialization=true
